<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="manifest" href="/static/manifest.webmanifest" />
    <link rel="icon" href="/static/logo.svg" type="image/svg+xml" />
    <title>Messenger Chat</title>
    <style>
      body { margin: 0; font-family: Arial, sans-serif; background: #0f172a; color: #e2e8f0; }
      .wrap { display: none; height: 100vh; }
      .login { display: grid; place-items: center; height: 100vh; }
      .card { width: min(460px, 92vw); background: #1e293b; padding: 20px; border-radius: 12px; }
      .app { display: flex; width: 100%; height: 100%; }
      .sidebar { width: 340px; border-right: 1px solid #334155; padding: 14px; overflow-y: auto; background: #111827; }
      .chat { flex: 1; display: flex; flex-direction: column; }
      .chat-head { border-bottom: 1px solid #334155; padding: 14px; font-weight: bold; }
      .messages { flex: 1; overflow-y: auto; padding: 14px; }
      .row { display: flex; gap: 8px; padding: 8px 14px 14px; border-top: 1px solid #334155; }
      input, button, select { border-radius: 8px; border: 1px solid #334155; background: #0b1220; color: #e2e8f0; padding: 10px; }
      input, select { width: 100%; }
      button { cursor: pointer; background: #2563eb; border-color: #2563eb; }
      .item { padding: 8px; border: 1px solid #334155; border-radius: 8px; margin-bottom: 6px; display: flex; justify-content: space-between; gap: 8px; align-items: center; }
      .actions { display: flex; gap: 6px; }
      .actions button { padding: 6px 8px; }
      .muted { color: #94a3b8; font-size: 12px; }
      .msg { margin-bottom: 10px; background: #1e293b; border: 1px solid #334155; padding: 8px; border-radius: 8px; }
      h3 { margin: 14px 0 8px; }
      .me { color: #86efac; }
      #error { color: #fca5a5; min-height: 20px; }
      .hidden { display: none; }
    </style>
  </head>
  <body>
    <div class="login" id="login">
      <div class="card">
        <h2>Messenger Chat</h2>
        <p class="muted">Vercel + Supabase mode.</p>
        <input id="emailInput" placeholder="Email address" />
        <div style="height:8px"></div>
        <input id="passwordInput" type="password" placeholder="Password (min 6 chars)" />
        <div style="height:10px"></div>
        <div style="display:flex; gap:8px;">
          <button id="registerBtn" onclick="document.getElementById('error').textContent='Working...'; if (window.__messengerAuth) { window.__messengerAuth('register'); } else { document.getElementById('error').textContent=(window.__messengerInitError || 'App failed to initialize. Reload with ?v=8'); }">Register</button>
          <button id="loginBtn" onclick="document.getElementById('error').textContent='Working...'; if (window.__messengerAuth) { window.__messengerAuth('login'); } else { document.getElementById('error').textContent=(window.__messengerInitError || 'App failed to initialize. Reload with ?v=8'); }">Login</button>
        </div>
        <div style="height:8px"></div>
        <button id="installBtn" class="hidden" style="width:100%;">Install App</button>
        <p id="error"></p>
      </div>
    </div>

    <div class="wrap" id="wrap">
      <div class="app">
        <aside class="sidebar">
          <div style="display:flex; justify-content:space-between; align-items:center; gap:8px;">
            <b id="meLabel"></b>
            <button id="logoutBtn">Logout</button>
          </div>

          <h3>Profile</h3>
          <div style="display:flex; gap:6px; margin-bottom:8px;">
            <input id="displayNameInput" placeholder="Your display name" />
            <button id="saveNameBtn">Save</button>
          </div>

          <h3>Contacts</h3>
          <div style="display:flex; gap:6px; margin-bottom:8px;">
            <select id="peopleSelect"></select>
            <button id="addContactBtn">Add</button>
          </div>
          <div id="contactsList"></div>

          <h3>Groups</h3>
          <div style="display:flex; gap:6px; margin-bottom:8px;">
            <input id="groupInput" placeholder="New group name" />
            <button id="createGroupBtn">Create</button>
          </div>
          <div style="display:flex; gap:6px; margin-bottom:8px;">
            <select id="inviteGroupSelect"></select>
            <select id="inviteContactSelect"></select>
            <button id="inviteBtn">Invite</button>
          </div>
          <div id="groupsList"></div>
        </aside>

        <section class="chat">
          <div class="chat-head" id="chatTitle">Select a contact or group</div>
          <div class="messages" id="messages"></div>
          <div class="row">
            <input id="messageInput" placeholder="Type a message..." />
            <button id="sendBtn">Send</button>
          </div>
        </section>
      </div>
    </div>

    <script>
      window.__messengerInitError = "";
      window.addEventListener("error", function (event) {
        var msg = event && event.message ? event.message : "Unknown script error";
        window.__messengerInitError = "Init error: " + msg;
        var errEl = document.getElementById("error");
        if (errEl && !window.__messengerAuth) {
          errEl.textContent = window.__messengerInitError;
        }
      });
    </script>
    <script src="/static/supabase-js.js"></script>
    <script src="/static/config.js"></script>
    <script>
      let sbClient = null;
      let me = null;
      let contacts = [];
      let people = [];
      let groups = [];
      let current = null;
      let installPrompt = null;
      let refreshTimer = null;
      const byConversation = new Map();

      const el = (id) => document.getElementById(id);
      const contactsList = el("contactsList");
      const groupsList = el("groupsList");
      const messages = el("messages");
      const chatTitle = el("chatTitle");
      const error = el("error");
      const peopleSelect = el("peopleSelect");
      const inviteGroupSelect = el("inviteGroupSelect");
      const inviteContactSelect = el("inviteContactSelect");

      window.addEventListener("error", (event) => {
        setError(`Script error: ${event.message}`);
      });

      function dmPair(idA, idB) { return [idA, idB].sort(); }
      function dmId(a, b) { return `dm:${[a, b].sort().join(":")}`; }
      function groupId(id) { return `group:${id}`; }
      function esc(text) { return String(text).replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;"); }
      function normalizeDisplayName(name, email) {
        const cleanName = String(name || "").trim();
        if (cleanName) return cleanName;
        const localPart = String(email || "").split("@")[0].trim();
        return localPart || "User";
      }
      function personLabel(person) {
        return `${normalizeDisplayName(person.display_name, person.email)} (${person.email})`;
      }

      function setError(message) {
        error.textContent = message || "";
      }

      function setLoggedIn(loggedIn) {
        el("login").style.display = loggedIn ? "none" : "grid";
        el("wrap").style.display = loggedIn ? "block" : "none";
      }

      async function ensureProfile(user) {
        const email = (user.email || "").toLowerCase();
        const { error: upsertError } = await sbClient.from("profiles").upsert({ id: user.id, email }, { onConflict: "id" });
        if (upsertError) throw upsertError;

        const { data: profile, error: profileError } = await sbClient
          .from("profiles")
          .select("id,email,display_name")
          .eq("id", user.id)
          .single();
        if (profileError) throw profileError;

        const displayName = normalizeDisplayName(profile.display_name, email);
        if (displayName !== String(profile.display_name || "").trim()) {
          const { error: updateError } = await sbClient
            .from("profiles")
            .update({ display_name: displayName, email })
            .eq("id", user.id);
          if (updateError) throw updateError;
        }

        return { id: user.id, email, displayName };
      }

      async function loadContacts() {
        const { data: rows, error: contactsError } = await sbClient
          .from("contacts")
          .select("contact_id")
          .eq("owner_id", me.id);
        if (contactsError) throw contactsError;

        if (!rows.length) {
          contacts = [];
          renderContacts();
          return;
        }

        const contactIds = rows.map((r) => r.contact_id);
        const { data: profiles, error: profilesError } = await sbClient
          .from("profiles")
          .select("id,email,display_name")
          .in("id", contactIds);
        if (profilesError) throw profilesError;

        const byId = new Map((profiles || []).map((p) => [p.id, p]));
        contacts = rows
          .map((row) => byId.get(row.contact_id))
          .filter(Boolean)
          .map((p) => ({
            id: p.id,
            email: p.email,
            displayName: normalizeDisplayName(p.display_name, p.email)
          }))
          .sort((a, b) =>
            a.displayName.localeCompare(b.displayName) || a.email.localeCompare(b.email)
          );
        renderContacts();
        renderPeopleSelect();
        renderInviteControls();
      }

      async function loadPeople() {
        const { data: rows, error: peopleError } = await sbClient
          .from("profiles")
          .select("id,email,display_name")
          .order("display_name", { ascending: true })
          .order("email", { ascending: true })
          .limit(500);
        if (peopleError) throw peopleError;
        people = rows || [];
        renderPeopleSelect();
      }

      async function loadGroups() {
        const { data: memberships, error: membersError } = await sbClient
          .from("group_members")
          .select("group_id")
          .eq("user_id", me.id);
        if (membersError) throw membersError;

        if (!memberships.length) {
          groups = [];
          renderGroups();
          return;
        }

        const groupIds = memberships.map((m) => m.group_id);
        const { data: groupRows, error: groupsError } = await sbClient
          .from("chat_groups")
          .select("id,name")
          .in("id", groupIds)
          .order("name", { ascending: true });
        if (groupsError) throw groupsError;

        groups = groupRows || [];
        renderGroups();
        renderInviteControls();
      }

      async function loadDmHistory(otherUserId, otherDisplayName) {
        const [a, b] = dmPair(me.id, otherUserId);
        const { data, error: historyError } = await sbClient
          .from("messages")
          .select("id,kind,dm_a,dm_b,group_id,sender_id,text,created_at")
          .eq("kind", "dm")
          .eq("dm_a", a)
          .eq("dm_b", b)
          .order("created_at", { ascending: true })
          .limit(500);
        if (historyError) throw historyError;

        byConversation.set(
          dmId(me.id, otherUserId),
          (data || []).map((m) => ({
            conversationId: dmId(me.id, otherUserId),
            fromId: m.sender_id,
            from: m.sender_id === me.id ? me.displayName : otherDisplayName,
            text: m.text,
            timestamp: m.created_at
          }))
        );
      }

      async function loadGroupHistory(group) {
        const { data, error: historyError } = await sbClient
          .from("messages")
          .select("id,kind,group_id,sender_id,text,created_at")
          .eq("kind", "group")
          .eq("group_id", group.id)
          .order("created_at", { ascending: true })
          .limit(500);
        if (historyError) throw historyError;

        const senderIds = [...new Set((data || []).map((m) => m.sender_id))];
        const senderEmails = {};
        if (senderIds.length) {
          const { data: profiles } = await sbClient.from("profiles").select("id,email,display_name").in("id", senderIds);
          (profiles || []).forEach((p) => {
            senderEmails[p.id] = normalizeDisplayName(p.display_name, p.email);
          });
        }

        byConversation.set(
          groupId(group.id),
          (data || []).map((m) => ({
            conversationId: groupId(group.id),
            fromId: m.sender_id,
            from: senderEmails[m.sender_id] || "Unknown",
            text: m.text,
            timestamp: m.created_at
          }))
        );
      }

      function renderContacts() {
        contactsList.innerHTML = contacts.map((c) => `
          <div class="item">
            <div>
              <div>${esc(c.displayName)}</div>
              <div class="muted">${esc(c.email)}</div>
            </div>
            <div class="actions"><button onclick="openDm('${encodeURIComponent(c.id)}','${encodeURIComponent(c.displayName)}','${encodeURIComponent(c.email)}')">Chat</button></div>
          </div>`).join("") || `<div class="muted">No contacts yet.</div>`;
      }

      function renderPeopleSelect() {
        const existing = new Set(contacts.map((c) => c.id));
        const candidates = people
          .filter((p) => p.id !== me.id && !existing.has(p.id))
          .sort((a, b) =>
            personLabel(a).localeCompare(personLabel(b))
          );
        peopleSelect.innerHTML = candidates.map((p) =>
          `<option value="${esc(p.id)}">${esc(personLabel(p))}</option>`
        ).join("") || `<option value="">No people available</option>`;
        el("addContactBtn").disabled = !candidates.length;
      }

      function renderInviteControls() {
        inviteGroupSelect.innerHTML = groups.map((g) =>
          `<option value="${esc(g.id)}">${esc(g.name)}</option>`
        ).join("") || `<option value="">No groups</option>`;
        inviteContactSelect.innerHTML = contacts.map((c) =>
          `<option value="${esc(c.id)}">${esc(c.displayName)} (${esc(c.email)})</option>`
        ).join("") || `<option value="">No contacts</option>`;
        el("inviteBtn").disabled = !(groups.length && contacts.length);
      }

      function renderGroups() {
        groupsList.innerHTML = groups.map((g) => `
          <div class="item">
            <div>${esc(g.name)}</div>
            <div class="actions"><button onclick="openGroup('${encodeURIComponent(g.id)}','${encodeURIComponent(g.name)}')">Open</button></div>
          </div>`).join("") || `<div class="muted">No groups yet.</div>`;
      }

      function renderMessages(conversationId) {
        const list = byConversation.get(conversationId) || [];
        messages.innerHTML = list.map((m) => {
          const who = m.fromId === me.id ? `<span class="me">${esc(m.from)}</span>` : esc(m.from);
          return `<div class="msg"><b>${who}</b>: ${esc(m.text)}<div class="muted">${new Date(m.timestamp).toLocaleString()}</div></div>`;
        }).join("");
        messages.scrollTop = messages.scrollHeight;
      }

      async function refreshCurrentHistory() {
        if (!current) return;
        if (current.kind === "dm") {
          await loadDmHistory(current.userId, current.displayName);
        } else {
          await loadGroupHistory(current.group);
        }
        renderMessages(current.id);
      }

      async function startSession(user) {
        me = await ensureProfile(user);
        el("displayNameInput").value = me.displayName;
        el("meLabel").textContent = `You: ${me.displayName} (${me.email})`;
        await loadPeople();
        await loadContacts();
        await loadGroups();
        setLoggedIn(true);
        setError("");
        if (refreshTimer) clearInterval(refreshTimer);
        refreshTimer = setInterval(async () => {
          try {
            await loadContacts();
            await loadGroups();
            await loadPeople();
            await refreshCurrentHistory();
          } catch (refreshError) {
            // Keep UI responsive if background refresh fails intermittently.
          }
        }, 3000);
      }

      async function auth(action) {
        try {
          const email = el("emailInput").value.trim().toLowerCase();
          const password = el("passwordInput").value.trim();
          if (!email || !password) return setError("Enter email and password.");
          if (password.length < 6) return setError("Password must be at least 6 characters.");
          if (!email.includes("@")) return setError("Enter a valid email address.");
          setError("Working...");

          const withTimeout = (promise, ms = 12000) =>
            Promise.race([
              promise,
              new Promise((_, reject) =>
                setTimeout(() => reject(new Error("Request timed out. School network may be blocking Supabase.")), ms)
              )
            ]);

          let result;
          if (action === "register") {
            result = await withTimeout(sbClient.auth.signUp({ email, password }));
          } else {
            result = await withTimeout(sbClient.auth.signInWithPassword({ email, password }));
          }
          if (result.error) return setError(result.error.message);
          if (!result.data.user) return setError("Could not authenticate. Try again.");

          // With email confirmation enabled, signUp may return a user but no session.
          if (!result.data.session) {
            return setError("Check your email and confirm your account, then log in.");
          }

          await startSession(result.data.user);
        } catch (authError) {
          const authErrorMessage = authError && authError.message ? authError.message : "Authentication failed.";
          setError(authErrorMessage);
        }
      }

      window.__messengerAuth = auth;

      window.openDm = async (encodedUserId, encodedName, encodedEmail) => {
        const userId = decodeURIComponent(encodedUserId);
        const displayName = decodeURIComponent(encodedName);
        const email = decodeURIComponent(encodedEmail);
        current = { kind: "dm", userId, displayName, email, id: dmId(me.id, userId) };
        chatTitle.textContent = `Direct chat with ${displayName}`;
        await loadDmHistory(userId, displayName);
        renderMessages(current.id);
      };

      window.openGroup = async (encodedGroupId, encodedName) => {
        const id = decodeURIComponent(encodedGroupId);
        const name = decodeURIComponent(encodedName);
        const group = { id, name };
        current = { kind: "group", group, id: groupId(id) };
        chatTitle.textContent = `Group: ${name}`;
        await loadGroupHistory(group);
        renderMessages(current.id);
      };

      el("registerBtn").onclick = () => auth("register");
      el("loginBtn").onclick = () => auth("login");

      el("saveNameBtn").onclick = async () => {
        const displayName = el("displayNameInput").value.trim();
        if (!displayName) return setError("Display name is required.");
        const { error: updateError } = await sbClient
          .from("profiles")
          .update({ display_name: displayName })
          .eq("id", me.id);
        if (updateError) return setError(updateError.message);
        me.displayName = displayName;
        el("meLabel").textContent = `You: ${me.displayName} (${me.email})`;
        setError("Name updated.");
        await refreshCurrentHistory();
      };

      el("addContactBtn").onclick = async () => {
        const contactId = peopleSelect.value;
        if (!contactId) return;
        if (contactId === me.id) return setError("You cannot add yourself.");
        const { error: insertError } = await sbClient.from("contacts").upsert(
          { owner_id: me.id, contact_id: contactId },
          { onConflict: "owner_id,contact_id" }
        );
        if (insertError) return setError(insertError.message);
        setError("");
        await loadContacts();
      };

      el("createGroupBtn").onclick = async () => {
        const name = el("groupInput").value.trim();
        if (!name) return;
        const { data: created, error: groupError } = await sbClient
          .from("chat_groups")
          .insert({ name, created_by: me.id })
          .select("id,name")
          .single();
        if (groupError) return setError(groupError.message);

        const { error: memberError } = await sbClient
          .from("group_members")
          .upsert({ group_id: created.id, user_id: me.id }, { onConflict: "group_id,user_id" });
        if (memberError) return setError(memberError.message);
        el("groupInput").value = "";
        await loadGroups();
      };

      el("inviteBtn").onclick = async () => {
        const groupIdValue = inviteGroupSelect.value;
        const contactId = inviteContactSelect.value;
        if (!groupIdValue || !contactId) return setError("Pick a group and contact to invite.");
        const group = groups.find((g) => g.id === groupIdValue);
        const contact = contacts.find((c) => c.id === contactId);
        if (!group || !contact) return setError("Please refresh and try the invite again.");
        const { error: inviteError } = await sbClient
          .from("group_members")
          .upsert({ group_id: groupIdValue, user_id: contactId }, { onConflict: "group_id,user_id" });
        if (inviteError) return setError(inviteError.message);
        setError(`Invited ${contact.displayName} to ${group.name}.`);
      };

      el("sendBtn").onclick = async () => {
        const text = el("messageInput").value.trim();
        if (!text || !current) return;
        let payload;
        if (current.kind === "dm") {
          const [a, b] = dmPair(me.id, current.userId);
          payload = { kind: "dm", dm_a: a, dm_b: b, sender_id: me.id, text };
        } else {
          payload = { kind: "group", group_id: current.group.id, sender_id: me.id, text };
        }
        const { error: insertError } = await sbClient.from("messages").insert(payload);
        if (insertError) return setError(insertError.message);
        el("messageInput").value = "";
        await refreshCurrentHistory();
      };

      el("logoutBtn").onclick = async () => {
        await sbClient.auth.signOut();
        if (refreshTimer) clearInterval(refreshTimer);
        refreshTimer = null;
        me = null;
        current = null;
        contacts = [];
        people = [];
        groups = [];
        byConversation.clear();
        messages.innerHTML = "";
        chatTitle.textContent = "Select a contact or group";
        setLoggedIn(false);
      };

      el("messageInput").addEventListener("keydown", (e) => { if (e.key === "Enter") el("sendBtn").click(); });
      el("passwordInput").addEventListener("keydown", (e) => { if (e.key === "Enter") auth("login"); });

      if ("serviceWorker" in navigator) navigator.serviceWorker.register("/static/service-worker.js?v=2");

      window.addEventListener("beforeinstallprompt", (event) => {
        event.preventDefault();
        installPrompt = event;
        el("installBtn").classList.remove("hidden");
      });

      el("installBtn").onclick = async () => {
        if (!installPrompt) return;
        installPrompt.prompt();
        await installPrompt.userChoice;
        installPrompt = null;
        el("installBtn").classList.add("hidden");
      };

      async function bootstrap() {
        if (!window.MESSENGER_CONFIG || !window.MESSENGER_CONFIG.supabaseUrl || !window.MESSENGER_CONFIG.supabaseAnonKey) {
          setError("Missing Supabase config. Edit /static/config.js with your project URL and anon key.");
          return;
        }
        sbClient = window.supabase.createClient(
          window.MESSENGER_CONFIG.supabaseUrl,
          window.MESSENGER_CONFIG.supabaseAnonKey
        );

        const { data } = await sbClient.auth.getUser();
        if (data && data.user) await startSession(data.user);
      }

      bootstrap();
    </script>
  </body>
</html>
